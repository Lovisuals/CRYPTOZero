exchanges:
  binance:
    ws_url: "wss://stream.binance.com:9443"
    rest_url: "https://api.binance.com"
    rate_limit: 1200

trading_pairs:
  - BTCUSDT
  - ETHUSDT
  - BNBUSDT

signal_thresholds:
  imbalance_ratio_buy: 3.0
  imbalance_ratio_sell: 0.33
  absorption_volume_multiplier: 50
  vacuum_min_levels: 3
  iceberg_volume_multiplier: 5.0
  iceberg_persist_seconds: 30.0

system:
  orderbook_depth: 500
  auto_trade_enabled: false
  testnet_mode: true
  trade_history_size: 10000
  cvd_lookback_periods: 1000
  signal_cooldown_seconds: 300
  rest_validation_interval: 60
  drift_threshold: 0.0001

apex:
  enabled: true
  poll_seconds: 30
  min_confidence: 85
  execution:
    use_futures_executor: false

external_apis:
  coinglass_api_key: ""
  twitter_bearer_token: ""
  reddit_client_id: ""
  reddit_client_secret: ""
  whale_alert_api_key: ""

telegram:
  alert_cooldown: 300

blockchain:
  enabled: false
  min_confidence: 80

risk:
  max_portfolio_drawdown_pct: 0.10
  max_daily_loss_pct: 0.05
  max_open_positions: 5
  max_risk_per_trade_pct: 0.02
  min_balance_usd: 50.0
  max_consecutive_losses: 5
  max_hourly_losses: 8
  circuit_cooldown_seconds: 1800
  trailing_stop_activation_pct: 0.01
  trailing_stop_callback_pct: 0.005
  max_holding_time_s: 3600
  position_check_interval_s: 2.0
  journal_path: "data/trade_journal.jsonl"

coinranking:
  enabled: true
  bitcoin_uuid: "Qwsogvtv82FCd"
